<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Evolve</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
            width:420px;
        }

        .logo{
            width:220px;
            display:block;
            margin:0 auto 25px;
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#7f8c8d;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#2c3e50;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #dcdde1;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#4e73df;
        }

        button{
            width:100%;
            padding:14px;
            background:#4e73df;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2e59d9;
        }

    </style>
</head>

<body>

<div class="login-box">

    <img
        src="{{ url_for('static', filename='images/evolve_logo.png') }}"
        alt="Evolve Logo"
        class="logo"
    >

    <h2>IT Asset Management</h2>

    <p class="subtitle">
        Evolve SRL
    </p>

    <form method="POST">

    <label>Username</label>
    <input
        type="text"
        name="username"
        placeholder="Enter your username"
        required
    >

    <label>Password</label>
    <input
        type="password"
        name="password"
        placeholder="Enter your password"
        required
    >

    <button type="submit">
        Login
    </button>

</form>

</div>

</body>
</html>
