<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IT Asset Management{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

.btn-primary{
    background:#4e73df;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
    text-decoration:none;
}

.btn-warning{
    background:#f6c23e;
    color:black;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
}

.btn-danger{
    background:#e74a3b;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
}

.btn-primary:hover{
    background:#2e59d9;
}

.btn-warning:hover{
    background:#dda20a;
}

.btn-danger:hover{
    background:#c0392b;
}

        body{
            margin:0;
            background:#f4f6f9;
        }

.topbar{
    height:60px;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    margin-left:250px;
}

.topbar a{
    margin-left:20px;
    text-decoration:none;
    color:#333;
    font-weight:bold;
}
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 20px;
    transition:0.3s;
    border-left:4px solid transparent;
}

.sidebar a:hover{
    background:#343a40;
    border-left:4px solid #0d6efd;
}

        .sidebar{
            position:fixed;
            left:0;
            top:0;
            width:250px;
            height:100vh;
            background:#212529;
            padding-top:20px;
        }

        .sidebar h3{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px 20px;
        }

        .sidebar a:hover{
            background:#343a40;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

    </style>

</head>
<body>

<div class="sidebar">

    <h3>IT Assets</h3>

    <a href="/">🏠 Home</a>

<a href="/dashboard">📊 Dashboard</a>

<a href="/assets">💻 Assets</a>

<a href="/add-asset">➕ Add Asset</a>

<a href="/reports">📄 Reports</a>

<a href="/interventions">🔧 Interventions</a>

<hr style="border-color:#555;">

<a href="/" style="color:#ff6b6b;">
    🚪 Logout
</a>
</div>
<div class="topbar">

    <h4>IT Asset Management System</h4>

    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/assets">Assets</a>
        <a href="/">Home</a>
    </div>

</div>
<div class="content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
